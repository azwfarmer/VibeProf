# Render Blueprint for the AI Tutor backend (apps/backend).
# The frontend stays on Vercel; this hosts the long-running Node API server.
# Deploy: push this file, then in Render -> "New +" -> "Blueprint" -> pick this repo.
services:
  - type: web
    name: aitutor-backend
    runtime: node
    region: oregon
    branch: main
    plan: free # free tier: no persistent disk, spins down after ~15 min idle
    # --include=dev because Render builds with NODE_ENV=production, which would
    # otherwise skip typescript/@types and break the `tsc` build.
    buildCommand: npm ci --include=dev && npm run build:backend
    startCommand: npm run start --workspace apps/backend
    healthCheckPath: /api/health
    autoDeploy: true
    # NOTE: no persistent disk on free tier. The JSON store falls back to the
    # default path on the ephemeral filesystem and RESETS on every restart/deploy.
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Secrets: set these in the Render dashboard (sync: false keeps them out of git).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
